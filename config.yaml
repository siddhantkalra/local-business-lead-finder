radius_km: 20

# Only export leads scoring at or above this threshold
min_lead_score: 6

website_checks:
  timeout_seconds: 8
  user_agent: "Mozilla/5.0 (compatible; LocalLeadFinder/1.0)"
  booking_keywords:
    - "book"
    - "appointment"
    - "schedule"
    - "reserve"
    - "contact us"
    - "get a quote"
    - "free estimate"

scoring:
  high_opportunity_reviews_max: 20
  mature_reviews_min: 100
  min_score_for_outreach_message: 7
